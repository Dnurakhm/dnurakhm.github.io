<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#070708' },
            gold: { DEFAULT: '#d4a853', 400: '#bf8f33' },
          },
          fontFamily: { display: ['Syne', 'sans-serif'], body: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #070708; color: #f8f8f8; overflow-x: hidden; -webkit-font-smoothing: antialiased; position: relative; }
    ::selection { background: rgba(212,168,83,0.25); }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-gradient-animated {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 0% 20%, rgba(212,168,83,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 100% 40%, rgba(212,168,83,0.025) 0%, transparent 50%),
        radial-gradient(ellipse 70% 40% at 50% 80%, rgba(212,168,83,0.015) 0%, transparent 50%),
        radial-gradient(ellipse 50% 50% at 20% 60%, rgba(255,255,255,0.008) 0%, transparent 40%);
      background-size: 200% 200%;
      animation: gradientShift 15s ease-in-out infinite;
    }

    .font-display { font-family: 'Syne', sans-serif; }
    .gold-text { background: linear-gradient(135deg, #d4a853, #eac15a, #bf8f33); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .gold-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(212,168,83,0.3), transparent); }

    .section-inner { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
    @media (max-width: 768px) { .section-inner { padding: 0 1.25rem; } }
    .section { padding: 8rem 0; }
    @media (max-width: 768px) { .section { padding: 4rem 0; } }

    .heading-xl { font-family: 'Syne', sans-serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 800; line-height: 1.02; letter-spacing: -0.03em; }

    .btn-primary { display: inline-flex; align-items: center; gap: 0.625rem; padding: 0.875rem 2rem; border-radius: 9999px; font-weight: 600; font-size: 0.9rem; background: linear-gradient(135deg, #d4a853, #eac15a); color: #070708; transition: all 0.3s; cursor: pointer; border: none; }
    .btn-primary:hover { transform: scale(1.04); box-shadow: 0 12px 48px rgba(212,168,83,0.2); }

    .btn-secondary { display: inline-flex; align-items: center; gap: 0.625rem; padding: 0.875rem 2rem; border-radius: 9999px; font-weight: 500; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.08); color: #aeaeb2; transition: all 0.3s; cursor: pointer; background: none; }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.15); color: #f8f8f8; }

    .chip { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.375rem 1rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: #8e8e93; }

    .glass-premium { background: rgba(255,255,255,0.02); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.04); }
    .glass-premium:hover { background: rgba(255,255,255,0.035); border-color: rgba(212,168,83,0.08); }

    .service-card { padding: 2rem; border-radius: 1.25rem; border: 1px solid rgba(255,255,255,0.04); transition: all 0.4s; }
    .service-card:hover { border-color: rgba(212,168,83,0.12); }

    .pricing-card { padding: 2.5rem 2rem; border-radius: 1.5rem; background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.04); transition: all 0.4s; }
    .pricing-card.featured { border-color: rgba(212,168,83,0.2); }
    .pricing-card:hover { transform: translateY(-3px); }

    .dot-grid { background-image: radial-gradient(circle, rgba(212,168,83,0.06) 0.5px, transparent 0.5px); background-size: 24px 24px; }

    .faq-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0; text-align: left; font-weight: 500; font-size: 0.95rem; color: #eeeef0; background: none; border: none; cursor: pointer; }
    .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .faq-answer.open { max-height: 200px; }

    .input-premium { width: 100%; padding: 0.875rem 1.25rem; border-radius: 0.75rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: #f8f8f8; font-size: 0.9rem; outline: none; transition: all 0.3s; font-family: 'Inter', sans-serif; }
    .input-premium:focus { border-color: rgba(212,168,83,0.25); box-shadow: 0 0 0 3px rgba(212,168,83,0.05); }
    .input-premium::placeholder { color: rgba(255,255,255,0.15); }

    @media (max-width: 1024px) { .desktop-only { display: none !important; } }
    @media (min-width: 1025px) { .mobile-only { display: none !important; } }

    .sticky-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(7,7,8,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.04); padding: 0.75rem 1rem; display: none; gap: 0.75rem; align-items: center; }
    @media (max-width: 1024px) { .sticky-bar { display: flex; } }

    nav { background: rgba(7,7,8,0.7); backdrop-filter: blur(28px); border-bottom: 1px solid rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div class="bg-gradient-animated"></div>
  <div class="relative z-[1]">
  {{ block "main" . }}{{ end }}

  <div class="sticky-bar">
    <a href="tel:{{ .Site.Params.phone }}" class="flex-1 py-3 rounded-full text-sm font-medium text-center border border-white/10 text-gray-300 hover:bg-white/5 transition">Позвонить</a>
    <a href="#contact" class="flex-1 py-3 rounded-full text-sm font-bold text-center text-surface bg-gold hover:bg-amber-400 transition">Консультация</a>
  </div>

  <script>
    // FAQ accordion
    document.querySelectorAll('.faq-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const answer = btn.nextElementSibling;
        const isOpen = answer.classList.contains('open');
        const icon = btn.querySelector('span');
        document.querySelectorAll('.faq-answer.open').forEach(a => {
          a.classList.remove('open');
          a.previousElementSibling.querySelector('span').style.transform = 'rotate(0deg)';
        });
        if (!isOpen) {
          answer.classList.add('open');
          if (icon) icon.style.transform = 'rotate(45deg)';
        }
      });
    });

    // Mobile menu
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuBtn && mobileMenu) {
      menuBtn.addEventListener('click', () => {
        const isOpen = !mobileMenu.classList.contains('hidden');
        mobileMenu.classList.toggle('hidden');
        document.body.style.overflow = isOpen ? '' : 'hidden';
      });
      document.querySelectorAll('#mobile-menu a').forEach(a => {
        a.addEventListener('click', () => { mobileMenu.classList.add('hidden'); document.body.style.overflow = ''; });
      });
    }
  </script>

  <!-- Optional: GSAP + Lenis for enhanced animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script>
    try {
      if (typeof Lenis !== 'undefined') {
        const lenis = new Lenis({ lerp: 0.08, wheelMultiplier: 0.8, syncTouch: true });
        lenis.on('scroll', () => ScrollTrigger.update());
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);
      }
    } catch(e) { console.log('Lenis failed:', e); }

    if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
      try {
        ScrollTrigger.config({ ignoreMobileResize: true });
        gsap.utils.toArray('[data-reveal]').forEach((el) => {
          gsap.from(el, {
            y: 30, opacity: 0, duration: 0.8, ease: 'power3.out',
            scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' },
            delay: parseFloat(el.dataset.delay) || 0
          });
        });
        gsap.utils.toArray('[data-reveal-left]').forEach((el) => {
          gsap.from(el, {
            x: -40, opacity: 0, duration: 0.8, ease: 'power3.out',
            scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' },
            delay: parseFloat(el.dataset.delay) || 0
          });
        });
        gsap.utils.toArray('[data-reveal-right]').forEach((el) => {
          gsap.from(el, {
            x: 40, opacity: 0, duration: 0.8, ease: 'power3.out',
            scrollTrigger: { trigger: el, start: 'top 85%', toggleActions: 'play none none none' },
            delay: parseFloat(el.dataset.delay) || 0
          });
        });
        gsap.utils.toArray('[data-counter]').forEach((el) => {
          const target = parseInt(el.dataset.counter);
          const suffix = el.dataset.suffix || '';
          if (target > 0) {
            gsap.from(el, {
              textContent: 0, duration: 1.0, ease: 'power2.out',
              snap: { textContent: 1 },
              scrollTrigger: { trigger: el, start: 'top 90%' },
              onUpdate: function() { el.textContent = Math.round(this.targets()[0].textContent) + suffix; }
            });
          }
        });
      } catch(e) { console.log('GSAP failed:', e); }
    }
  </script>
  </div>
</body>
</html>
